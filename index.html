<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Question...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#ffeaf1;
    --rose:#ff7aa2;
    --deep-rose:#e05a86;
    --plum:#5b3a52;
    --cream:#fffafc;
    --gold:#ffcf5c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Quicksand',sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #ffd9e6 0%, transparent 60%),
      linear-gradient(160deg, #fff4f8 0%, #ffe6ef 45%, #ffdbe8 100%);
    color:var(--plum);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    overflow-x:hidden;position:relative;
  }

  /* floating hearts background */
  .hearts{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .heart{
    position:absolute;bottom:-40px;font-size:22px;opacity:.55;
    animation:rise linear infinite;
    filter:drop-shadow(0 2px 4px rgba(224,90,134,.25));
  }
  @keyframes rise{
    0%{transform:translateY(0) rotate(0deg) scale(.8);opacity:0}
    12%{opacity:.6}
    100%{transform:translateY(-115vh) rotate(220deg) scale(1.1);opacity:0}
  }

  .stage{position:relative;z-index:2;width:100%;max-width:560px;padding:28px}

  /* the letter card */
  .letter{
    background:var(--cream);
    border-radius:26px;
    padding:44px 38px 40px;
    box-shadow:0 24px 60px -18px rgba(224,90,134,.45), 0 2px 0 #ffd6e4 inset;
    position:relative;
    opacity:0;transform:translateY(26px) scale(.98);
    animation:cardIn .9s cubic-bezier(.2,.8,.2,1) .25s forwards;
    border:1px solid #ffe0ea;
  }
  @keyframes cardIn{to{opacity:1;transform:none}}
  .letter::before{
    content:"♥";position:absolute;top:-16px;left:50%;transform:translateX(-50%);
    background:var(--rose);color:#fff;width:40px;height:40px;border-radius:50%;
    display:grid;place-items:center;font-size:18px;
    box-shadow:0 8px 18px -4px rgba(224,90,134,.6);
    animation:beat 1.3s ease-in-out infinite;
  }
  @keyframes beat{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.18)}}

  .eyebrow{
    text-align:center;letter-spacing:.32em;text-transform:uppercase;
    font-size:11px;font-weight:600;color:var(--rose);margin-bottom:6px;
  }
  h1{
    font-family:'Caveat',cursive;font-weight:700;
    font-size:clamp(38px,9vw,58px);line-height:1.02;
    text-align:center;color:var(--deep-rose);margin-bottom:18px;
  }

  .note p{
    font-size:16px;line-height:1.7;margin-bottom:14px;
    opacity:0;transform:translateY(10px);
    animation:lineIn .7s ease forwards;
  }
  .note p:nth-child(1){animation-delay:.9s}
  .note p:nth-child(2){animation-delay:1.15s}
  .note p:nth-child(3){animation-delay:1.4s}
  @keyframes lineIn{to{opacity:1;transform:none}}
  .sign{
    font-family:'Caveat',cursive;font-size:26px;color:var(--deep-rose);
    text-align:right;margin-top:2px;
    opacity:0;animation:lineIn .7s ease 1.65s forwards;
  }

  .the-question{
    font-family:'Caveat',cursive;font-size:clamp(30px,7vw,40px);
    text-align:center;color:var(--plum);margin:26px 0 20px;
    opacity:0;animation:lineIn .7s ease 1.9s forwards;
  }

  .buttons{
    display:flex;gap:16px;justify-content:center;align-items:center;
    flex-wrap:wrap;min-height:60px;position:relative;
    opacity:0;animation:lineIn .7s ease 2.1s forwards;
  }
  button{
    font-family:'Quicksand',sans-serif;font-weight:600;font-size:17px;
    border:none;border-radius:999px;padding:15px 34px;cursor:pointer;
    transition:transform .18s ease, box-shadow .18s ease, background .2s;
  }
  .yes{
    background:linear-gradient(135deg,var(--rose),var(--deep-rose));
    color:#fff;box-shadow:0 12px 26px -8px rgba(224,90,134,.7);
  }
  .yes:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 18px 34px -8px rgba(224,90,134,.8)}
  .no{
    background:#fff;color:var(--plum);border:2px solid #ffd0df;
    position:relative;
  }
  .no:hover{background:#fff0f5}

  /* success screen */
  .success{
    display:none;text-align:center;
    animation:cardIn .8s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .success.show{display:block}
  .success .big{font-family:'Caveat',cursive;font-size:clamp(48px,13vw,84px);color:var(--deep-rose);line-height:1}

  /* two hearts drifting together into one */
  .hearts-merge{position:relative;height:130px;margin-bottom:6px}
  .hearts-merge .hm{position:absolute;top:50%;left:50%;font-size:52px}
  .hm.left{animation:mergeLeft 1.6s ease forwards}
  .hm.right{animation:mergeRight 1.6s ease forwards}
  .hm.one{opacity:0;font-size:64px;animation:popOne 1s ease 1.5s forwards}
  @keyframes mergeLeft{
    0%{transform:translate(-160%,-50%) rotate(-15deg);opacity:0}
    30%{opacity:1}
    100%{transform:translate(-50%,-50%) scale(.2);opacity:0}
  }
  @keyframes mergeRight{
    0%{transform:translate(60%,-50%) rotate(15deg);opacity:0}
    30%{opacity:1}
    100%{transform:translate(-50%,-50%) scale(.2);opacity:0}
  }
  @keyframes popOne{
    0%{transform:translate(-50%,-50%) scale(.2);opacity:0}
    55%{transform:translate(-50%,-50%) scale(1.35);opacity:1}
    75%{transform:translate(-50%,-50%) scale(.92)}
    100%{transform:translate(-50%,-50%) scale(1);opacity:1}
  }
  .spark{position:absolute;top:50%;left:50%;font-size:22px;opacity:0}
  .s1{animation:sparkle 1.1s ease 1.7s forwards;--tx:-70px;--ty:-46px}
  .s2{animation:sparkle 1.1s ease 1.85s forwards;--tx:70px;--ty:-40px}
  .s3{animation:sparkle 1.1s ease 2s forwards;--tx:0px;--ty:56px}
  @keyframes sparkle{
    0%{transform:translate(-50%,-50%) scale(.3);opacity:0}
    50%{opacity:1}
    100%{transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1.1);opacity:0}
  }
  .success p{font-size:17px;margin-top:14px;line-height:1.6}
  .yes-gif{display:block;max-width:300px;width:82%;margin:18px auto 4px;border-radius:20px}
  .letter-cat{display:block;width:190px;max-width:60%;margin:6px auto 10px;
    animation:catFloat 3s ease-in-out infinite;
  }
  @keyframes catFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .stage.hide-letter .letter{display:none}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s !important;animation-delay:0s !important}
    .heart{display:none}
  }
</style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <div class="stage" id="stage">
    <div class="letter" id="letter">
      <div class="eyebrow">A little letter for you</div>
      <h1>Hi, Nickishia.</h1>
      <div class="note">
        <img class="letter-cat" src="/heart-cat.gif" alt="a little cat holding a heart for you">
        <div class="sign">— yours, hopefully 🌸</div>
      </div>

      <div class="the-question">Will you be my girlfriend?</div>
      <div class="buttons" id="buttons">
        <button class="yes" id="yesBtn">Yes 💖</button>
        <button class="no" id="noBtn">No</button>
      </div>
    </div>

    <div class="success" id="success">
      <div class="hearts-merge">
        <span class="hm left">💗</span>
        <span class="hm right">💖</span>
        <span class="hm one">❤️</span>
        <span class="spark s1">✨</span>
        <span class="spark s2">✨</span>
        <span class="spark s3">🌸</span>
      </div>
      <div class="big">It's official 💞</div>
      <img class="yes-gif" src="/hugging-cats.gif" alt="two cats hugging">
      <p>You just made my whole day (and probably my whole week).</p>
    </div>
  </div>

<script>
  // floating hearts
  const emojis=['💕','💖','🌸','💗','💘','🩷','✨'];
  const wrap=document.getElementById('hearts');
  for(let i=0;i<26;i++){
    const h=document.createElement('div');
    h.className='heart';
    h.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    h.style.left=Math.random()*100+'vw';
    h.style.fontSize=(16+Math.random()*22)+'px';
    h.style.animationDuration=(7+Math.random()*8)+'s';
    h.style.animationDelay=(Math.random()*8)+'s';
    wrap.appendChild(h);
  }

  // dodging No button — label stays "No", it just moves
  const noBtn=document.getElementById('noBtn');
  const yesBtn=document.getElementById('yesBtn');
  let n=0;
  function dodge(e){
    n++;
    // drop a flower where the button was tapped
    if(e){ dropFlower(e.clientX, e.clientY); }
    noBtn.style.position='relative';
    const dx=(Math.random()*220-110);
    const dy=(Math.random()*120-60);
    noBtn.style.transform=`translate(${dx}px,${dy}px) rotate(${Math.random()*20-10}deg)`;
    // grow the yes button each dodge
    const s=1+Math.min(n*0.12,1.1);
    yesBtn.style.transform=`scale(${s})`;
  }
  noBtn.addEventListener('mouseenter',()=>dodge());
  noBtn.addEventListener('click',dodge);

  // falling flower when No is tapped
  function dropFlower(x,y){
    const flowers=['🌸','🌷','🌺','🌼','💐'];
    const f=document.createElement('div');
    f.textContent=flowers[Math.floor(Math.random()*flowers.length)];
    f.style.cssText=`position:fixed;left:${x}px;top:${y}px;font-size:${22+Math.random()*14}px;z-index:6;pointer-events:none;transform:translate(-50%,-50%)`;
    document.body.appendChild(f);
    let vy=1.2+Math.random()*1, drift=(Math.random()*2-1)*1.4, life=0, rot=0, px=x, py=y;
    (function fall(){
      life++; py+=vy; vy+=0.06; px+=drift; rot+=drift*4;
      f.style.top=py+'px'; f.style.left=px+'px';
      f.style.transform=`translate(-50%,-50%) rotate(${rot}deg)`;
      f.style.opacity=Math.max(0,1-life/120);
      if(py<window.innerHeight+40 && life<120) requestAnimationFrame(fall); else f.remove();
    })();
  }

  // Yes -> confetti + success
  yesBtn.addEventListener('click',()=>{
    burst();
    document.getElementById('stage').classList.add('hide-letter');
    document.getElementById('success').classList.add('show');
  });

  function burst(){
    const colors=['#ff7aa2','#e05a86','#ffcf5c','#ff9ec4','#fff','#ffd6e4'];
    for(let i=0;i<120;i++){
      const c=document.createElement('div');
      c.style.position='fixed';
      c.style.left='50%';c.style.top='45%';
      c.style.width=(6+Math.random()*8)+'px';
      c.style.height=(6+Math.random()*8)+'px';
      c.style.background=colors[Math.floor(Math.random()*colors.length)];
      c.style.borderRadius=Math.random()>.5?'50%':'2px';
      c.style.zIndex=5;c.style.pointerEvents='none';
      document.body.appendChild(c);
      const ang=Math.random()*Math.PI*2, vel=4+Math.random()*9;
      let x=0,y=0,vx=Math.cos(ang)*vel,vy=Math.sin(ang)*vel-6,life=0;
      (function fall(){
        life++;x+=vx;y+=vy;vy+=0.28;vx*=0.99;
        c.style.transform=`translate(${x}px,${y}px) rotate(${life*12}deg)`;
        c.style.opacity=Math.max(0,1-life/90);
        if(life<90)requestAnimationFrame(fall);else c.remove();
      })();
    }
  }
</script>
</body>
</html>
